version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: rabbitmq

    hostname: rabbitmq

    restart: always

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      TZ: America/Santo_Domingo

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

    networks:
      - messaging-network

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M

volumes:
  rabbitmq_data:

networks:
  messaging-network:
    driver: bridge