
############################################################
# APPLICATION
############################################################

spring.application.name=consumer

server.port=8084

############################################################
# LOG
############################################################

logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.rabbitmq.ms.producer=DEBUG

############################################################
# MYSQL
############################################################

spring.datasource.url=jdbc:mysql://192.168.0.114:/ms-rabbitmq?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=User123456!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


############################################################
# RABBITMQ
############################################################

spring.rabbitmq.host=192.168.0.114
spring.rabbitmq.port=5672

spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

spring.rabbitmq.virtual-host=/

############################################################
# CONNECTION
############################################################

spring.rabbitmq.connection-timeout=10000

############################################################
# PUBLISHER
############################################################

# Espera confirmación del Broker
spring.rabbitmq.publisher-confirm-type=correlated

# Retorna mensajes no enroutados
spring.rabbitmq.publisher-returns=true

spring.rabbitmq.template.mandatory=true

############################################################
# LISTENER
############################################################

spring.rabbitmq.listener.simple.acknowledge-mode=auto

# Consumidores concurrentes
spring.rabbitmq.listener.simple.concurrency=2

# Máximo de consumidores
spring.rabbitmq.listener.simple.max-concurrency=5

# Mensajes entregados antes del ACK
spring.rabbitmq.listener.simple.prefetch=10

# Reintentos
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2

############################################################
# LOGGING
############################################################

logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.rabbit=INFO