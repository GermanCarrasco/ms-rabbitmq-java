############################################################
# APPLICATION
############################################################

spring.application.name=producer
server.port=8083

############################################################
# LOG
############################################################

logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.rabbitmq.ms.producer=DEBUG

############################################################
# MYSQL
############################################################
spring.datasource.url=jdbc:mysql://mysql:3309/ms-rabbitmq?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=User123456!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################################################
# RABBITMQ
############################################################

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672

spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

spring.rabbitmq.virtual-host=/

############################################################
# CONNECTION
############################################################

spring.rabbitmq.connection-timeout=10000

############################################################
# PUBLISHER
############################################################

spring.rabbitmq.publisher-confirm-type=correlated

spring.rabbitmq.publisher-returns=true

spring.rabbitmq.template.mandatory=true

############################################################
# LISTENER
############################################################

spring.rabbitmq.listener.simple.acknowledge-mode=auto

spring.rabbitmq.listener.simple.concurrency=2

spring.rabbitmq.listener.simple.max-concurrency=5

spring.rabbitmq.listener.simple.prefetch=10

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2

############################################################
# LOGGING
############################################################

logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.rabbit=INFO