spring.application.name=producer

server.port=8083

############################################################
# MYSQL
############################################################

spring.datasource.url=jdbc:mysql://192.168.0.114:3309/ms-rabbitmq?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=User123456!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#############################################
# RabbitMQ
#############################################

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}

spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}

spring.rabbitmq.virtual-host=/

#############################################
# Connection
#############################################

spring.rabbitmq.connection-timeout=10000

#############################################
# Publisher
#############################################

spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

#############################################
# Listener
#############################################

spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.concurrency=2
spring.rabbitmq.listener.simple.max-concurrency=5

#############################################
# Template
#############################################

spring.rabbitmq.template.mandatory=true